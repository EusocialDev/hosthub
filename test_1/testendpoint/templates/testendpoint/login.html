{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Eusocial Voice Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{% static 'testendpoint/css/login.css' %}">
</head>
<body class="login-page">
    <div class="login-container">
        <h1 class="login-title">Eusocial Voice Agent</h1>

        <div class="employee-picker">
            <div class="employee-picker-label">Select your name</div>

            <div class="employee-list">
                {% for employee in employees %}
                    <button
                        type="button"
                        class="employee-btn"
                        data-user-id="{{ employee.id }}"
                        data-name="{{ employee.first_name|default:employee.username }}"
                    >
                        {{ employee.first_name|default:employee.username }}
                    </button>
                {% endfor %}
            </div>
        </div>

        <div class="pin-display">
            <div class="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            <div class="pin-text" id="pin-display">Select your name</div>
        </div>

        <form method="post" id="login-form" novalidate>
            {% csrf_token %}
            <input type="hidden" name="user_id" id="user-id-input" value="">
            <input type="hidden" name="pin" id="pin-input" value="">

            <div class="keypad">
                <button type="button" class="keypad-btn" data-number="1">1</button>
                <button type="button" class="keypad-btn" data-number="2">2</button>
                <button type="button" class="keypad-btn" data-number="3">3</button>
                <button type="button" class="keypad-btn" data-number="4">4</button>
                <button type="button" class="keypad-btn" data-number="5">5</button>
                <button type="button" class="keypad-btn" data-number="6">6</button>
                <button type="button" class="keypad-btn" data-number="7">7</button>
                <button type="button" class="keypad-btn" data-number="8">8</button>
                <button type="button" class="keypad-btn" data-number="9">9</button>
                <button type="button" class="keypad-btn clear" id="clear-btn">✕</button>
                <button type="button" class="keypad-btn" data-number="0">0</button>
                <button type="button" class="keypad-btn submit" id="submit-btn">✓</button>
            </div>
        </form>

        {% if messages %}
            <div class="login-alerts">
                {% for message in messages %}
                    <div class="login-alert {% if message.tags == 'error' %}login-alert-error{% else %}login-alert-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>

    <script>
        let currentPin = '';
        const maxPinLength = 4;

        const pinInput = document.getElementById('pin-input');
        const pinDisplay = document.getElementById('pin-display');
        const dots = document.querySelectorAll('.pin-dot');
        const keypadBtns = document.querySelectorAll('.keypad-btn[data-number]');
        const clearBtn = document.getElementById('clear-btn');
        const submitBtn = document.getElementById('submit-btn');
        const loginForm = document.getElementById('login-form');
        const userIdInput = document.getElementById('user-id-input');
        const employeeBtns = document.querySelectorAll('.employee-btn');

        let selectedUserId = null;
        let selectedUserName = '';

        keypadBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                addDigit(this.getAttribute('data-number'));
            });
        });

        employeeBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                employeeBtns.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');

                selectedUserId = this.getAttribute('data-user-id');
                selectedUserName = this.getAttribute('data-name');
                userIdInput.value = selectedUserId;

                clearInlineWarning();
                updateDisplay();
            });
        });

        clearBtn.addEventListener('click', clearPin);
        submitBtn.addEventListener('click', submitPin);

        function addDigit(digit) {
            if (currentPin.length < maxPinLength) {
                currentPin += digit;
                clearInlineWarning();
                updateDisplay();
            }
        }

        function clearPin() {
            currentPin = '';
            clearInlineWarning();
            updateDisplay();
        }

        function removeLastDigit() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                clearInlineWarning();
                updateDisplay();
            }
        }

        function showInlineWarning(message) {
            pinDisplay.textContent = message;
            pinDisplay.classList.add('pin-warning');
        }

        function clearInlineWarning() {
            pinDisplay.classList.remove('pin-warning');
        }

        function updateSubmitState() {
            const ready = selectedUserId && currentPin.length === maxPinLength;
            submitBtn.disabled = !ready;
            submitBtn.classList.toggle('disabled', !ready);
        }

        function updateDisplay() {
            dots.forEach((dot, index) => {
                dot.classList.toggle('filled', index < currentPin.length);
            });

            if (!selectedUserId) {
                pinDisplay.textContent = currentPin.length
                    ? 'Press ✓ after selecting your name'
                    : 'Select your name';
            } else if (currentPin.length === 0) {
                pinDisplay.textContent = `Enter PIN for ${selectedUserName}`;
            } else {
                pinDisplay.textContent = '•'.repeat(currentPin.length);
            }

            pinInput.value = currentPin;
            updateSubmitState();
        }

        function submitPin() {
            if (!selectedUserId) {
                showInlineWarning('Please select your name first');
                updateSubmitState();
                return;
            }

            if (currentPin.length !== maxPinLength) {
                showInlineWarning('Enter your 4-digit PIN');
                updateSubmitState();
                return;
            }

            pinInput.value = currentPin;
            loginForm.submit();
        }

        document.addEventListener('keydown', function (e) {
            if (e.key >= '0' && e.key <= '9') {
                addDigit(e.key);
            } else if (e.key === 'Backspace') {
                e.preventDefault();
                removeLastDigit();
            } else if (e.key === 'Delete') {
                e.preventDefault();
                clearPin();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                submitPin();
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            updateDisplay();

            const alerts = document.querySelectorAll('.login-alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.classList.add('fade-out');
                    setTimeout(() => {
                        alert.remove();
                    }, 300);
                }, 3500);
            });
        });
    </script>
</body>
</html>
